<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="screen-orientation" content="landscape" />
  <title>Canvas 台球游戏</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="app">
    <header class="top-ui">
      <div class="ui-panel top-panel">
        <span>回合信息区域</span>
      </div>
    </header>

    <main class="game-area">
      <canvas id="gameCanvas"></canvas>
    </main>

    <footer class="bottom-ui">
      <div class="ui-panel bottom-panel">
        <div class="spin-control-wrapper">
          <span class="control-label">旋转</span>
          <canvas id="spinCanvas" width="80" height="80"></canvas>
        </div>
        <div class="panel-divider"></div>
        <div class="power-section">
          <span class="control-label">力度</span>
          <div class="power-bar">
            <div class="power-fill"></div>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="./js/game.js"></script>
</body>
</html>
